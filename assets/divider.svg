<svg width="1200" height="28" viewBox="0 0 1200 28" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="15%" stop-color="#58A6FF"/>
      <stop offset="50%" stop-color="#A371F7"/>
      <stop offset="85%" stop-color="#39D0D8"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
      <animate attributeName="x1" values="-20%;100%;-20%" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="80%;200%;80%" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="softGlow"><feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <line x1="0" y1="14" x2="1200" y2="14" stroke="url(#lineGrad)" stroke-width="2.5" filter="url(#softGlow)"/>
  <circle cx="600" cy="14" r="4" fill="#A371F7">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
