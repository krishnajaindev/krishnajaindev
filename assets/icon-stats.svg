<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF"/><stop offset="100%" stop-color="#39D0D8"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="1.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="20" cy="20" r="18" fill="none" stroke="url(#g)" stroke-width="1.6" opacity="0.35"/>
  <rect x="11" y="21" width="4.5" height="9" rx="1" fill="url(#g)" filter="url(#gl)">
    <animate attributeName="height" values="9;13;9" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="21;17;21" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="17.75" y="15" width="4.5" height="15" rx="1" fill="url(#g)" filter="url(#gl)">
    <animate attributeName="height" values="15;19;15" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="y" values="15;11;15" dur="2.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="24.5" y="10" width="4.5" height="20" rx="1" fill="url(#g)" filter="url(#gl)">
    <animate attributeName="height" values="20;24;20" dur="1.9s" repeatCount="indefinite"/>
    <animate attributeName="y" values="10;6;10" dur="1.9s" repeatCount="indefinite"/>
  </rect>
</svg>
