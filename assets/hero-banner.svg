<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="55%" stop-color="#12161d"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0F6FC"/>
      <stop offset="100%" stop-color="#58A6FF"/>
    </linearGradient>

    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39D0D8"/>
      <stop offset="100%" stop-color="#A371F7"/>
    </linearGradient>

    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39D0D8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#39D0D8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A371F7" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#A371F7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="280" fill="url(#bgGrad)"/>

  <!-- soft floating glows -->
  <circle cx="980" cy="70" r="140" fill="url(#glowCyan)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-14; 0,0" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="210" r="120" fill="url(#glowPurple)">
    <animateTransform attributeName="transform" type="translate" values="0,0; -10,10; 0,0" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- rotating geometric ring decoration (right side) -->
  <g transform="translate(1010,140)">
    <g>
      <polygon points="0,-70 61,-35 61,35 0,70 -61,35 -61,-35" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.55">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="40s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="0,-42 36,-21 36,21 0,42 -36,21 -36,-21" fill="none" stroke="#58A6FF" stroke-width="1" opacity="0.4">
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="30s" repeatCount="indefinite"/>
      </polygon>
      <circle r="5" fill="#39D0D8">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- name -->
  <text x="70" y="118" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="url(#nameGrad)">
    Krishna Jain
  </text>

  <!-- subtitle -->
  <text x="72" y="156" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#8B949E">
    Full-Stack Developer &#8226; AI Systems Builder &#8226; CSE Student
  </text>

  <!-- typing line, revealed segment-by-segment via SMIL opacity animation (freeze-on-end so it doesn't loop) -->
  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="18">
    <text x="72" y="204" fill="#39D0D8" opacity="0">
      &gt;
      <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="88" y="204" fill="#39D0D8" opacity="0">
      building
      <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="168" y="204" fill="#A371F7" font-weight="600" opacity="0">
      Pathwise
      <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="255" y="204" fill="#8B949E" opacity="0">
      — AI career guidance for job-ready developers
      <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.6s" fill="freeze"/>
    </text>
    <rect x="72" y="190" width="10" height="20" fill="#39D0D8">
      <animate attributeName="opacity" values="1;0;1" dur="1s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="x" from="72" to="672" begin="0.3s" dur="2.4s" fill="freeze"/>
    </rect>
  </g>

  <!-- thin base accent line -->
  <rect x="0" y="276" width="1200" height="4" fill="url(#ringGrad)" opacity="0.7"/>
</svg>
